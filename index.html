    // Helper for LocalStorage Persistence
    function usePersistentState(key, initial) {
      const [state, setState] = useState(() => {
        try {
          const saved = localStorage.getItem(key);
          return saved ? JSON.parse(saved) : initial;
        } catch (e) {
          return initial;
        }
      });
      useEffect(() => {
        try {
          localStorage.setItem(key, JSON.stringify(state));
        } catch (e) {}
      }, [key, state]);
      return [state, setState];
    }

    function AuthModal({ isOpen, onClose, setCurrentUser, registeredUsers, setRegisteredUsers }) {
      const [mode, setMode] = useState('login'); // login | signup

      const [name, setName] = useState('');
      const [role, setRole] = useState('user'); // user | instructor

      if (!isOpen) return null;

      const handleAuth = (e) => {
        e.preventDefault();
        if (mode === 'login') {
          const user = registeredUsers.find(u => u.email === email);
          if (user) {
            setCurrentUser(user);
            onClose();
          } else {
            alert("등록되지 않은 이메일입니다. 회원가입을 먼저 진행해 주세요.");
          }
        } else {
          if (!name || !email) {
            alert("이름과 이메일을 입력해 주세요.");
            return;
          }
          const newUser = {
            id: 'u_' + Date.now(),
            email,
            name,
            role: role === 'instructor' ? 'instructor_pending' : 'user',
            joinedAt: new Date().toISOString().slice(0, 10)
          };
          setRegisteredUsers([...registeredUsers, newUser]);
          setCurrentUser(newUser);
          alert(role === 'instructor' ? "강사 회원가입 완료! 관리자의 정강사 승인 후 강사방 이용이 가능합니다." : "회원가입이 완료되었습니다.");

                  <i className="fa-solid fa-gears"></i>
                </div>
                <h2 className="text-lg font-bold text-white">통합 관리자 콘솔</h2>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-white">
                <i className="fa-solid fa-xmark text-lg"></i>
              </button>
            </div>

            <div className="flex flex-1 overflow-hidden">
              <div className="w-48 bg-slate-900/80 p-4 border-r border-slate-800 space-y-1">
                <button
                  onClick={() => setAdminTab('users')}
                  className={`w-full text-left px-3 py-2 rounded-xl text-xs font-bold transition ${adminTab === 'users' ? 'bg-cyan-500 text-slate-950' : 'text-slate-400'}`}
                >
                  👥 강사/회원 승인
                </button>
                <button
                  onClick={() => setAdminTab('apps')}
                  className={`w-full text-left px-3 py-2 rounded-xl text-xs font-bold transition ${adminTab === 'apps' ? 'bg-cyan-500 text-slate-950' : 'text-slate-400'}`}
                >
                  📑 출강신청 관리
                </button>
              </div>

              <div className="flex-1 p-6 overflow-y-auto space-y-4">
                {adminTab === 'users' && (
                  <div className="space-y-4">
                    <h3 className="font-bold text-white text-sm">회원 및 강사 승인 목록</h3>
                    <div className="space-y-2">
                      {registeredUsers.map(u => (
                        <div key={u.id} className="p-3 bg-slate-900 rounded-xl border border-slate-800 flex items-center justify-between text-xs">
                          <div>
                            <div className="font-bold text-white">{u.name} ({u.email})</div>
                            <div className="text-slate-400 text-[11px]">권한: {u.role} | 가입일: {u.joinedAt}</div>
                          </div>
                          {u.role === 'instructor_pending' && (
                            <button
                              onClick={() => approveInstructor(u.id)}
                              className="px-3 py-1 bg-emerald-500 text-slate-950 font-bold rounded-lg cursor-pointer"
                            >
                              정강사 승인
                            </button>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {adminTab === 'apps' && (
                  <div className="space-y-4">
                    <h3 className="font-bold text-white text-sm">접수된 출강 신청</h3>
                    <div className="space-y-2">
                      {applications.length === 0 ? (
                        <div className="text-xs text-slate-500">접수된 신청이 없습니다.</div>
                      ) : (
                        applications.map(a => (
                          <div key={a.id} className="p-4 bg-slate-900 rounded-xl border border-slate-800 text-xs space-y-2">
                            <div className="flex justify-between font-bold text-white">
                              <span>{a.organizationName} ({a.applicantName})</span>
                              <span className={a.status === 'approved' ? 'text-emerald-400' : 'text-amber-400'}>
                                {a.status === 'approved' ? '배정완료' : '검토중'}
                              </span>
                            </div>
                            <p className="text-slate-400">{a.phone} | 대상: {a.targetStudents} | 희망일: {a.desiredDate}</p>
                            {a.status === 'pending' && (
                              <button
                                onClick={() => approveApp(a.id)}
                                className="px-3 py-1 bg-cyan-500 text-slate-950 font-bold rounded-lg cursor-pointer"
                              >
                                강사 배정 완료 처리
                              </button>
                            )}
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- MOUNT REACT APP ---
    const rootElement = document.getElementById('root');
    if (rootElement) {
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    }
  </script>
</body>
</html>
