<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="연천 AI 교육 전문가 강사 양성과정 제1기 공식 커뮤니티 & 플랫폼" />
    <title>연천 AI 교육 전문가 플랫폼 | 제1기 공식 커뮤니티</title>

    <!-- Enforce trailing slash for relative asset resolution on directory URLs -->
    <script type="text/javascript">
      (function() {
        var path = window.location.pathname;
        if (path.length > 1 && !path.endsWith('/') && !path.split('/').pop().includes('.')) {
          window.location.replace(path + '/' + window.location.search + window.location.hash);
        }
      })();
    </script>

    <!-- SPA URL restore script for GitHub Pages subpaths -->
    <script type="text/javascript">
      (function(l) {
        if (l.search && l.search.indexOf('p=') !== -1) {
          var params = new URLSearchParams(l.search);
          var p = params.get('p');
          var q = params.get('q');
          if (p !== null) {
            var newUrl = l.pathname.slice(0, -1) + decodeURIComponent(p) + (q ? '?' + decodeURIComponent(q) : '') + l.hash;
            window.history.replaceState(null, null, newUrl);
          }
        }
      })(window.location);
    </script>

    <!-- Font Awesome 6 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Google Fonts & Pretendard -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />

    <!-- Firebase SDK Config (Global window fallback) -->
    <script>
      window.firebaseConfig = {
        apiKey: "AIzaSyBlE093-UtBCsj08i3hcHmxDWc9600TAEg",
        authDomain: "yc-ai-1stdb.firebaseapp.com",
        projectId: "yc-ai-1stdb",
        storageBucket: "yc-ai-1stdb.firebasestorage.app",
        messagingSenderId: "955983200176",
        appId: "1:955983200176:web:bc6e1ea21154a502bd2075"
      };
    </script>

    <!-- Resource & Script Error Handler (useCapture = true to catch 404s) -->
    <script>
      window.addEventListener('error', function(e) {
        console.error('Captured resource error:', e);
        var msgEl = document.getElementById('loading-fallback-msg');
        if (msgEl) {
          var targetName = (e.target && (e.target.src || e.target.href)) ? (e.target.src || e.target.href) : '';
          msgEl.innerHTML = '<span style="color:#f87171; font-weight:bold;">파일/스크립트 로딩 중 오류가 발생했습니다.</span><br><span style="font-size:11px; opacity:0.8; word-break:break-all;">' + (targetName ? '경로: ' + targetName : (e.message || '네트워크 경로 오류')) + '</span><br><button onclick="localStorage.clear();location.reload();" style="margin-top:12px; padding:8px 18px; background:#00e5ff; color:#0f172a; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">캐시 초기화 후 새로고침</button>';
        }
      }, true);

      // Fallback timer: If React hasn't set window.reactAppMounted after 3.5s
      setTimeout(function() {
        if (!window.reactAppMounted) {
          var msgEl = document.getElementById('loading-fallback-msg');
          if (msgEl) {
            msgEl.innerHTML = '<span style="color:#fbbf24; font-weight:bold;">로딩 시간이 길어지고 있습니다.</span><br><span style="font-size:11px; color:#94a3b8;">스크립트를 불러오는 중이거나 네트워크 상태를 확인 중입니다.</span><br><div style="margin-top:12px; display:flex; gap:8px; justify-center;"><button onclick="location.reload()" style="padding:6px 14px; background:#334155; color:#fff; border:none; border-radius:8px; font-size:12px; cursor:pointer;">새로고침</button><button onclick="localStorage.clear();location.reload();" style="padding:6px 14px; background:#00e5ff; color:#0f172a; border:none; border-radius:8px; font-size:12px; font-weight:bold; cursor:pointer;">초기화</button></div>';
          }
        }
      }, 3500);
    </script>
  </head>
  <body class="gradient-bg min-h-screen text-slate-800 antialiased">
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Pretendard', sans-serif; background-color: #0f172a; color: #f8fafc; text-align: center; padding: 20px;">
        <div style="width: 48px; height: 48px; border: 4px solid rgba(0,229,255,0.2); border-top-color: #00e5ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
        <h2 style="font-size: 18px; font-weight: 700; margin-bottom: 8px;">연천 AI 교육 전문가 플랫폼</h2>
        <p id="loading-fallback-msg" style="font-size: 13px; color: #94a3b8; max-width: 380px; line-height: 1.6;">시스템을 로딩하고 있습니다. 잠시만 기다려 주세요...</p>
        <style>
          @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
