    <title>연천 AI 교육 전문가 플랫폼 | 제1기 공식 커뮤니티</title>

    <!-- GitHub Pages Subpath & Relative Assets Auto-Fix -->
    <script type="text/javascript">
      (function() {
        var l = window.location;
        var path = l.pathname;
        
        // 1. 디렉토리 경로에 접속했으나 끝에 '/'가 없는 경우 (예: /repo-name -> /repo-name/)
        // 끝에 '/'가 없으면 상대경로 ./assets/ 가 상위 도메인/assets/ 로 잘못 해석되어 404가 발생합니다.
        if (path.length > 1 && !path.endsWith('/') && !path.split('/').pop().includes('.')) {
          l.replace(l.protocol + '//' + l.host + path + '/' + l.search + l.hash);
          return;
        }

        // 2. 동적 <base> 태그 추가 (상대경로 자산 및 라우팅 보장)
        var baseHref = path.endsWith('/') ? path : path.substring(0, path.lastIndexOf('/') + 1);
        var baseEl = document.createElement('base');
        baseEl.href = baseHref;
        document.head.appendChild(baseEl);

        // 3. 404.html 리다이렉트 파라미터 복원 (SPA 서브라우팅 복원)
        if (l.search && l.search.indexOf('p=') !== -1) {
          var params = new URLSearchParams(l.search);
          var p = params.get('p');
          var q = params.get('q');
          if (p !== null) {
            var newUrl = baseHref.slice(0, -1) + decodeURIComponent(p) + (q ? '?' + decodeURIComponent(q) : '') + l.hash;
            window.history.replaceState(null, null, newUrl);
          }
        }
      })();
    </script>

    <!-- Resource & Script Error Handler -->
    <script>
      window.addEventListener('error', function(e) {
        console.error('Captured resource error:', e);
        var msgEl = document.getElementById('loading-fallback-msg');
        if (msgEl) {
          var targetName = (e.target && (e.target.src || e.target.href)) ? (e.target.src || e.target.href) : '';
          msgEl.innerHTML = '<span style="color:#f87171; font-weight:bold;">파일 또는 스크립트 로딩 실패</span><br><span style="font-size:11px; opacity:0.8; word-break:break-all;">' + (targetName ? '경로: ' + targetName : (e.message || '네트워크 경로 오류')) + '</span><br><button onclick="localStorage.clear();location.reload();" style="margin-top:12px; padding:8px 18px; background:#00e5ff; color:#0f172a; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">캐시 초기화 후 새로고침</button>';
        }
      }, true);

      // Fallback timer: If React hasn't mounted after 5s
      setTimeout(function() {
        if (!window.reactAppMounted) {
          var msgEl = document.getElementById('loading-fallback-msg');
          if (msgEl) {
            msgEl.innerHTML = '<span style="color:#fbbf24; font-weight:bold;">초기 로딩 진행 중입니다.</span><br><span style="font-size:11px; color:#94a3b8;">잠시만 기다려 주시거나, 계속 반응이 없다면 새로고침해 주세요.</span><br><div style="margin-top:12px; display:flex; gap:8px; justify-content:center;"><button onclick="location.reload()" style="padding:6px 14px; background:#334155; color:#fff; border:none; border-radius:8px; font-size:12px; cursor:pointer;">새로고침</button><button onclick="localStorage.clear();location.reload();" style="padding:6px 14px; background:#00e5ff; color:#0f172a; border:none; border-radius:8px; font-size:12px; font-weight:bold; cursor:pointer;">초기화</button></div>';
          }
        }
      }, 5000);
    </script>
