    <title>연천 AI 교육 전문가 플랫폼 | 제1기 공식 커뮤니티</title>

    <!-- Font Awesome 6 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Google Fonts & Pretendard -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />

    <!-- SPA URL restore script for GitHub Pages subpaths -->
    <script type="text/javascript">
      (function(l) {
        if (l.search && l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).filter(function(s) {
            return s.slice(0, 2) === 'p='
          })[0];
          if (decoded) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded.slice(2) + l.hash
            );
          }
        }
      })(window.location);
    </script>

    <!-- Early global script error handler -->
    <script>
      window.addEventListener('error', function(e) {
        console.error('Global script error:', e);
        var msgEl = document.getElementById('loading-fallback-msg');
        if (msgEl) {
          msgEl.innerHTML = '<span style="color:#f87171; font-weight:bold;">시스템 로딩 중 스크립트 오류가 발생했습니다.</span><br><span style="font-size:11px; opacity:0.8;">' + (e.message || '네트워크 또는 파일 경로 오류') + '</span><br><button onclick="localStorage.clear();location.reload();" style="margin-top:12px; padding:8px 18px; background:#00e5ff; color:#0f172a; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">새로고침 및 캐시 초기화</button>';
        }
      });
    </script>

    <!-- Firebase SDK Config (Global window fallback) -->
    <script>

        authDomain: "yc-ai-1stdb.firebaseapp.com",

        storageBucket: "yc-ai-1stdb.firebasestorage.app",
        messagingSenderId: "955983200176",
        appId: "1:955983200176:web:bc6e1ea21154a502bd2075"
      };

  </head>
  <body class="gradient-bg min-h-screen text-slate-800 antialiased">
