    <!-- GitHub Pages Subpath & Relative Assets Auto-Fix -->
    <script type="text/javascript">
      (function() {
        var l = window.location;
        var path = l.pathname;
        
        // 1. 디렉토리 경로 끝에 '/' 보장
        if (path.length > 1 && !path.endsWith('/') && !path.split('/').pop().includes('.')) {
          l.replace(l.protocol + '//' + l.host + path + '/' + l.search + l.hash);
          return;
        }

        // 2. 404.html 리다이렉트 파라미터 복원 (SPA 서브라우팅 복원)
        if (l.search && l.search.indexOf('p=') !== -1) {
          var params = new URLSearchParams(l.search);
          var p = params.get('p');
          var q = params.get('q');
          if (p !== null) {
            var baseHref = path.endsWith('/') ? path : path.substring(0, path.lastIndexOf('/') + 1);
            var newUrl = baseHref.slice(0, -1) + decodeURIComponent(p) + (q ? '?' + decodeURIComponent(q) : '') + l.hash;
            window.history.replaceState(null, null, newUrl);
          }
        }
      })();
    </script>
